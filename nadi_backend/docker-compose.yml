services:
  postgres:
    image: postgres:17-alpine
    container_name: waroeng_postgres
    environment:
      POSTGRES_USER: waroeng
      POSTGRES_PASSWORD: waroeng_secret
      POSTGRES_DB: waroeng
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waroeng"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
