services:
  postgres:
    image: postgres:16-alpine
    container_name: kasir_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: kasir_db
      POSTGRES_USER: kasir_user
      POSTGRES_PASSWORD: kasir_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
