name: serve_app
description: Serve - Business Operating System untuk F&B Indonesia
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.4.3

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # UI & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.0

  # Swipe Actions
  flutter_slidable: ^3.1.1

  # URL Launcher (WhatsApp)
  url_launcher: ^6.3.1

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  uuid: ^4.4.0

  # PDF & Sharing
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^9.0.0
  path_provider: ^2.1.3

  # Haptics
  vibration: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
